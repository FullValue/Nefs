<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retour vers Nefsy</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            background: #09090b;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            max-width: 420px;
            width: 100%;
            background: #18181b;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 32px 24px;
            text-align: center;
        }
        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #b39164;
            letter-spacing: 0.5px;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        p {
            font-size: 14px;
            line-height: 1.5;
            color: #a1a1aa;
            margin-bottom: 20px;
        }
        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(179,145,100,0.25);
            border-top-color: #b39164;
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn {
            display: inline-block;
            background: #b39164;
            color: #ffffff;
            font-weight: 600;
            font-size: 15px;
            padding: 14px 24px;
            border-radius: 12px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.92; }
        .small {
            font-size: 12px;
            color: #71717a;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">NEFSY</div>
        <div class="spinner" id="spinner"></div>
        <h1 id="title">Retour vers l'application…</h1>
        <p id="message">Si l'application ne s'ouvre pas automatiquement, appuyez sur le bouton ci-dessous.</p>
        <a id="openBtn" class="btn" href="#">Ouvrir l'application Nefsy</a>
        <p class="small">Vous pouvez fermer cet onglet une fois revenu dans l'application.</p>
    </div>

    <script>
        (function () {
            var APP_SCHEME = 'guideomra://payment-status';
            var search = window.location.search || '';
            var deepLink = APP_SCHEME + search;

            var btn = document.getElementById('openBtn');
            btn.setAttribute('href', deepLink);

            try {
                window.location.href = deepLink;
            } catch (e) {
                // ignore
            }

            setTimeout(function () {
                var s = document.getElementById('spinner');
                if (s) s.style.display = 'none';
            }, 1500);
        })();
    </script>
</body>
</html>
